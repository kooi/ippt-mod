                    <span class="input-group-btn">

                        </button>
                    </span>
                </div>

                <div id="description" class="section" style="margin-top: 1em">
                    <p id="assignment-name-content"></p>
                    <p id="description-content"></p>
                </div>

                <div
                    data-childcomponent="challenge-sneeuwvlok"
                    class="runestone explainer ac_section alert alert-warning"
                >
                    <textarea
                        data-component="activecode"
                        id="challenge-sneeuwvlok"
                        data-lang="python"
                        data-timelimit="25000"
                        data-audio=""
                        data-caption=""
                        data-enabledownload="true"
                    >
import turtle
tina = turtle.Turtle()
tina.shape("turtle")
tina.speed(10)








</textarea
                    >

            <script>
                var external_imports = [
                    {
                        title: "Sterren",
                        url: "https://raw.githubusercontent.com/kooi/ippt-mod/refs/heads/main/code/sterren.py",
                        description: "",
                        assignment: "sterren",
                    },
                    {
                        title: "Huizen (1)",
                        url: "https://raw.githubusercontent.com/kooi/ippt-mod/refs/heads/main/code/huizen-1.py",
                        description: "",
                        assignment: "huizen-1",
                    },
                    {
                        title: "Huizen (2)",
                        url: "https://raw.githubusercontent.com/kooi/ippt-mod/refs/heads/main/code/huizen-2.py",
                        description: "",
                        assignment: "huizen-2",
                    },
                    {
                        title: "Polygonen",
                        url: "https://raw.githubusercontent.com/kooi/ippt-mod/refs/heads/main/code/polygonen.py",
                        description: "",
                        assignment: "polygonen",
                    },
                    {
                        title: "Hexagon",
                        url: "https://raw.githubusercontent.com/kooi/ippt-mod/refs/heads/main/code/hexagon.py",
                        description: "",
                        assignment: "hexagon",
                    },
                    {
                        title: "Gekleurde envelop",
                        url: "https://raw.githubusercontent.com/kooi/ippt-mod/refs/heads/main/code/envelop.py",
                        description: "",
                        assignment: "envelop",
                    },
                ];

                document
                    .getElementById("load-script")
                    .addEventListener("click", (e) => {
                        let ss = document.getElementById("source-selection");
                        let dsc = document.getElementById(
                            "description-content",
                        );
                        let ass = document.getElementById(
                            "assignment-name-content",
                        );

                        let xml = new XMLHttpRequest();
                        xml.open("GET", ss.selectedOptions[0].value, true);
                        xml.onload = function () {
                            if (this.status == 200) {
                                edList["challenge-sneeuwvlok"].editor.setValue(
                                    this.responseText,
                                );
                                dsc.innerHTML =
                                    external_imports[ss.selectedIndex][
                                        "description"
                                    ];
                                ass.innerHTML =
                                    external_imports[ss.selectedIndex][
                                        "assignment"
                                    ];
                            }
                        };
                        xml.send();
                    });

                window.addEventListener(
                    "load",
                    () => {
                        let ss = document.getElementById("source-selection");

                        external_imports.forEach((e) => {
                            let option = document.createElement("option");
                            option.text = e.title;
                            option.value = e.url;
                            ss.add(option);
                        });
                    },
                    { once: true },
                );
            </script>
